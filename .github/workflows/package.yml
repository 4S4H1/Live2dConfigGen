name: Package

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  build-windows-package:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "pyinstaller>=6"

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "L2DConfigEditor" --add-data "l2d_config_editor/editor_schema.json;l2d_config_editor" --paths "$PWD" "l2d_config_editor\main.py"

      - name: Archive package
        shell: pwsh
        run: |
          $artifactName = "L2DConfigEditor-windows-${{ github.ref_name }}-${{ github.run_number }}"
          Compress-Archive -Path "dist\L2DConfigEditor.exe" -DestinationPath "dist\$artifactName.zip" -Force
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            dist/L2DConfigEditor.exe
            dist/${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error
          retention-days: 14
